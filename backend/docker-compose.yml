services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sinun
      POSTGRES_PASSWORD: sinun
      POSTGRES_DB: sinun
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://sinun:sinun@db:5432/sinun
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  pgdata:
